<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор фрахту — ТОВ Геосан</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-slate-100 relative">

    <div id="sidebar" class="fixed bg-white flex flex-col overflow-hidden">
        <div class="mobile-handle cursor-pointer" onclick="toggleSidebar()"></div>

        <div class="px-6 pt-2 pb-4 border-b border-slate-100 shrink-0">
            <div class="grid grid-cols-[minmax(0,1fr)_auto] items-start gap-x-3 gap-y-2">
                <h1 class="text-lg font-bold text-slate-800 min-w-0">
                    <a href="https://www.geosun.net.ua" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 min-w-0 text-inherit no-underline hover:opacity-90 transition-opacity rounded-md outline-none focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2">
                        <img src="GeoSun_logo_svg.svg" alt="" width="36" height="36" class="h-9 w-9 shrink-0 object-contain object-center box-border border border-slate-200 rounded-lg bg-white" decoding="async" />
                        <span id="txt-title" class="min-w-0 truncate">ТОВ Геосан</span>
                    </a>
                </h1>
                <div class="flex items-center gap-2 shrink-0 justify-self-end">
                    <div class="relative">
                        <select id="lang-select" onchange="setLanguage(this.value)" class="bg-slate-100 border border-slate-200 text-[11px] font-bold uppercase rounded-lg pl-3 pr-8 py-1.5 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                            <option value="uk">UK</option>
                            <option value="ru">RU</option>
                            <option value="en">EN</option>
                        </select>
                    </div>
                    <button onclick="clearAllPoints()" class="text-[11px] text-white bg-red-500 hover:bg-red-600 active:bg-red-700 font-bold px-3 py-1.5 rounded-lg transition-colors" id="btn-clear">Очистити все</button>
                </div>
                <div class="flex flex-col items-start min-w-0 leading-tight">
                    <p class="text-[11px] text-slate-700 font-extrabold uppercase tracking-wider" id="txt-subtitle">Планування фрахту</p>
                    <span class="text-[11px] text-blue-700 font-extrabold whitespace-nowrap" id="headerTotalDistance">0 км</span>
                </div>
                <button type="button" onclick="sendToGoogleSheets()" id="btn-submit" disabled class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-600 text-white px-3 py-2 rounded-lg font-bold text-[11px] shadow-md transition-all flex items-center justify-center gap-1.5 group whitespace-nowrap">
                    <span id="txt-submit-btn">Надіслати запит</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <div class="p-4 shrink-0 bg-white">
            <div class="flex gap-2 relative">
                <div class="relative flex-1">
                    <input id="searchInput" type="text" autocomplete="off" placeholder="Додати точку..."
                        class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <div id="searchResults" class="autocomplete-results hidden custom-scrollbar"></div>
                </div>
            </div>
        </div>

        <div id="pointsContainer" class="flex-1 overflow-y-auto custom-scrollbar px-4 pb-4 space-y-0"></div>

        <div id="routeInfo" class="hidden shrink-0"></div>

        <div id="emptyState" class="p-10 text-center flex-1 flex flex-col justify-center items-center opacity-30">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-3 text-blue-500"><path d="m9 18 6-6-6-6"/></svg>
            <p class="text-xs font-medium" id="txt-empty">Оберіть точки на карті для розрахунку</p>
        </div>
    </div>

    <div id="map"></div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-xl text-xs z-[5000] transition-all duration-300 opacity-0 pointer-events-none font-medium flex items-center gap-3 border border-slate-700">
        <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
        <span id="toastMessage">Повідомлення</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/map-app.js"></script>
</body>
</html>
